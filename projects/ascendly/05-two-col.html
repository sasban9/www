<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ascendly — Teacher & Student Continuity</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,system-ui,sans-serif;
    background:#0b1016;
    color:#edf2f7;
    overflow-x:hidden;
}

.background-glow{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left, rgba(91,140,255,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(84,255,190,0.10), transparent 30%);
    z-index:-1;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px;
    padding:32px;
    min-height:100vh;
}

.panel{
    background:rgba(18,24,32,0.88);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:28px;
    padding:28px;
    backdrop-filter:blur(14px);
    animation:fadeUp 0.8s ease;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.header{
    display:flex;
    gap:18px;
    align-items:center;
    margin-bottom:28px;
}

.avatar{
    width:78px;
    height:78px;
    border-radius:24px;
    background:linear-gradient(135deg,#4ea8de,#57cc99);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:700;
    color:white;
    flex-shrink:0;
}

.meta h1{
    font-size:28px;
    margin-bottom:6px;
}

.meta p{
    color:#9fb0c3;
    line-height:1.5;
}

.tagline{
    margin-top:10px;
    color:#dbe8f7;
    font-size:14px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin-bottom:28px;
}

.stat{
    background:#161d26;
    border-radius:18px;
    padding:18px;
    transition:transform 0.3s ease;
}

.stat:hover{
    transform:translateY(-4px);
}

.stat h2{
    font-size:28px;
    margin-bottom:4px;
}

.stat span{
    color:#8ea0b3;
    font-size:13px;
}

.section-title{
    font-size:18px;
    margin-bottom:16px;
    color:#f1f6fc;
}

.card-list{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.card{
    background:#151c24;
    border:1px solid rgba(255,255,255,0.05);
    border-radius:20px;
    padding:18px;
    transition:
        transform 0.25s ease,
        border-color 0.25s ease,
        background 0.25s ease;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);
    transform:translateX(-100%);
    transition:transform 0.8s ease;
}

.card:hover::before{
    transform:translateX(100%);
}

.card:hover{
    transform:translateY(-3px);
    border-color:rgba(255,255,255,0.12);
    background:#19212b;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:14px;
}

.name{
    font-size:17px;
    font-weight:600;
    margin-bottom:4px;
}

.subtitle{
    color:#8ea0b3;
    font-size:13px;
}

.badges{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:14px;
}

.badge{
    background:#243241;
    color:#dce9f6;
    padding:7px 12px;
    border-radius:999px;
    font-size:12px;
    transition:transform 0.2s ease;
}

.badge:hover{
    transform:scale(1.05);
}

.quote{
    margin-top:16px;
    color:#d5e1ec;
    line-height:1.6;
    font-size:14px;
}

.timeline{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.timeline-item{
    border-left:2px solid rgba(87,204,153,0.35);
    padding-left:14px;
    position:relative;
    opacity:0;
    transform:translateX(10px);
    animation:slideIn 0.5s ease forwards;
}

.timeline-item::before{
    content:"";
    position:absolute;
    left:-6px;
    top:4px;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#57cc99;
}

.timeline-year{
    color:#57cc99;
    font-size:12px;
    margin-bottom:4px;
    letter-spacing:0.04em;
}

.timeline-text{
    color:#dbe7f2;
    line-height:1.5;
    font-size:14px;
}

.mini-avatar{
    width:46px;
    height:46px;
    border-radius:14px;
    background:linear-gradient(135deg,#ff9f1c,#ef476f);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    flex-shrink:0;
}

.teacher-chip{
    display:flex;
    align-items:center;
    gap:12px;
    background:#151d25;
    border-radius:16px;
    padding:14px;
    transition:transform 0.25s ease;
}

.teacher-chip:hover{
    transform:translateX(4px);
}

.footer-note{
    margin-top:24px;
    color:#7e90a2;
    font-size:13px;
    line-height:1.6;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes slideIn{
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@media(max-width:980px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="background-glow"></div>

<div class="container">

    <!-- LEFT COLUMN -->
    <section class="panel">

        <div class="header">
            <div class="avatar" id="teacherAvatar">MS</div>

            <div class="meta">
                <h1 id="teacherName"></h1>
                <p id="teacherRole"></p>

                <div class="tagline" id="teacherPhilosophy"></div>
            </div>
        </div>

        <div class="stats" id="teacherStats"></div>

        <h2 class="section-title">Students Endorsed Over Time</h2>

        <div class="card-list" id="studentCards"></div>

        <div class="footer-note">
            This profile reflects long-term contribution history,
            observed initiative, resilience, and meaningful moments
            preserved across years.
        </div>

    </section>

    <!-- RIGHT COLUMN -->
    <section class="panel">

        <div class="header">
            <div class="avatar" style="background:linear-gradient(135deg,#ff9f1c,#ef476f);" id="studentAvatar">AR</div>

            <div class="meta">
                <h1 id="studentName"></h1>
                <p id="studentHeadline"></p>

                <div class="tagline">
                    Multi-teacher continuity profile built from
                    observed moments over time.
                </div>
            </div>
        </div>

        <div class="stats" id="studentStats"></div>

        <h2 class="section-title">Teacher Endorsements</h2>

        <div class="card-list" id="teacherEndorsements"></div>

        <h2 class="section-title" style="margin-top:28px;">
            Growth Continuity Timeline
        </h2>

        <div class="timeline" id="studentTimeline"></div>

    </section>

</div>

<script>

/* =========================
   JSON DATA LAYER
========================= */

const data = {

    teacher: {
        name: "Meera Sharma",
        initials: "MS",
        role: "Science Teacher • 14 Years • Jaipur",
        philosophy:
            "I look for students who quietly persist and help others without recognition.",

        stats: [
            { value:"1,284", label:"Observations" },
            { value:"412", label:"Students Seen" },
            { value:"14", label:"Years Active" }
        ],

        students: [

            {
                name:"Aarav Singh, 9B",
                year:"Observed Since 2028",
                strengths:["Initiative","Contribution","Curiosity"],
                note:"Started a peer science learning group voluntarily during Class 8."
            },

            {
                name:"Meena Patel",
                year:"Observed Since 2029",
                strengths:["Resilience","Leadership"],
                note:"Continued attending school during severe flood conditions and organized group study sessions."
            },

            {
                name:"Farhan Ali",
                year:"Observed Since 2030",
                strengths:["Craftsmanship","Curiosity"],
                note:"Built low-cost irrigation models from discarded electronics."
            }

        ]
    },

    student: {

        name:"Aarav Singh, 9B",
        initials:"AS",
        headline:"Community Builder • Robotics • Peer Leadership",

        stats:[
            { value:"12", label:"Teacher Endorsements" },
            { value:"37", label:"Growth Moments" },
            { value:"8", label:"Years Tracked" }
        ],

        endorsements:[

            {
                teacher:"Meera Sharma",
                role:"Science Teacher",
                observation:
                    "Repeatedly organized peer learning circles without being asked.",
                strengths:["Initiative","Contribution"]
            },

            {
                teacher:"Rakesh Verma",
                role:"Mathematics Teacher",
                observation:
                    "Stayed after school consistently to help weaker students prepare for exams.",
                strengths:["Responsibility","Leadership"]
            },

            {
                teacher:"Anita Rao",
                role:"Computer Science Teacher",
                observation:
                    "Built robotics prototypes independently beyond curriculum requirements.",
                strengths:["Curiosity","Craftsmanship"]
            }

        ],

        timeline:[

            {
                year:"2028 • Age 13",
                text:"Started voluntary peer tutoring group for classmates."
            },

            {
                year:"2030 • Age 15",
                text:"Led school robotics exhibition using recycled materials."
            },

            {
                year:"2032 • Age 17",
                text:"Organized local science workshops for younger students."
            },

            {
                year:"2036 • Age 21",
                text:"Built community-focused education hardware startup."
            }

        ]
    }

};

/* =========================
   RENDER TEACHER
========================= */

document.getElementById("teacherName").innerText =
    data.teacher.name;

document.getElementById("teacherAvatar").innerText =
    data.teacher.initials;

document.getElementById("teacherRole").innerText =
    data.teacher.role;

document.getElementById("teacherPhilosophy").innerText =
    data.teacher.philosophy;

const teacherStats =
    document.getElementById("teacherStats");

data.teacher.stats.forEach(stat=>{

    teacherStats.innerHTML += `
        <div class="stat">
            <h2>${stat.value}</h2>
            <span>${stat.label}</span>
        </div>
    `;
});

const studentCards =
    document.getElementById("studentCards");

data.teacher.students.forEach(student=>{

    const badges =
        student.strengths
        .map(s=>`<div class="badge">${s}</div>`)
        .join("");

    studentCards.innerHTML += `
        <div class="card">

            <div class="row">

                <div>
                    <div class="name">${student.name}</div>
                    <div class="subtitle">${student.year}</div>
                </div>

            </div>

            <div class="badges">
                ${badges}
            </div>

            <div class="quote">
                "${student.note}"
            </div>

        </div>
    `;
});

/* =========================
   RENDER STUDENT
========================= */

document.getElementById("studentName").innerText =
    data.student.name;

document.getElementById("studentAvatar").innerText =
    data.student.initials;

document.getElementById("studentHeadline").innerText =
    data.student.headline;

const studentStats =
    document.getElementById("studentStats");

data.student.stats.forEach(stat=>{

    studentStats.innerHTML += `
        <div class="stat">
            <h2>${stat.value}</h2>
            <span>${stat.label}</span>
        </div>
    `;
});

const teacherEndorsements =
    document.getElementById("teacherEndorsements");

data.student.endorsements.forEach(item=>{

    const strengths =
        item.strengths
        .map(s=>`<div class="badge">${s}</div>`)
        .join("");

    teacherEndorsements.innerHTML += `
        <div class="teacher-chip">

            <div class="mini-avatar">
                ${item.teacher.split(" ").map(n=>n[0]).join("")}
            </div>

            <div style="flex:1;">

                <div class="name">
                    ${item.teacher}
                </div>

                <div class="subtitle">
                    ${item.role}
                </div>

                <div class="quote">
                    "${item.observation}"
                </div>

                <div class="badges">
                    ${strengths}
                </div>

            </div>

        </div>
    `;
});

/* =========================
   TIMELINE
========================= */

const timeline =
    document.getElementById("studentTimeline");

data.student.timeline.forEach((item,index)=>{

    timeline.innerHTML += `
        <div class="timeline-item"
             style="animation-delay:${index * 0.12}s">

            <div class="timeline-year">
                ${item.year}
            </div>

            <div class="timeline-text">
                ${item.text}
            </div>

        </div>
    `;
});

</script>

</body>
</html>
