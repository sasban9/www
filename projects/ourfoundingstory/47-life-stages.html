/* =========================================================
RESET
========================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    overflow-x:hidden;

    background:var(--bg);
    color:var(--text-primary);

    font-family:var(--font-body);

    transition:
    background .6s cubic-bezier(.19,1,.22,1),

}

button{
    border:none;
    background:none;
    font:inherit;
    color:inherit;
    cursor:pointer;
}

img{
    max-width:100%;
    display:block;
}

/* =========================================================
STRUCTURE TOKENS
========================================================= */

:root{

    --container:1400px;

    --space-xs:10px;
    --space-sm:16px;
    --space-md:24px;
    --space-lg:40px;
    --space-xl:64px;

    --radius-sm:14px;
    --radius-md:24px;
    --radius-lg:36px;
    --radius-pill:999px;

    --transition:
    all .6s cubic-bezier(.19,1,.22,1);

/* =========================================================
THEMES
========================================================= */

    --accent:#c8a46f;

    --border-soft:rgba(255,255,255,.08);

    --card-bg:rgba(255,255,255,.03);

}

/* =========================================================
GLOBAL
========================================================= */

.site-header{

    justify-content:space-between;

    border:1px solid var(--border-soft);

    background:var(--header-bg);

    backdrop-filter:blur(16px);

.logo{

    font-size:24px;

}

.top-actions{
    display:flex;
    align-items:center;

.theme-switcher{

    gap:8px;

.theme-btn{

    height:14px;
    border-radius:50%;

.theme-btn[data-theme="theme-estate"]{
    background:#c8a46f;

========================================================= */

    margin-bottom:20px;
}

.hero-title{

}

.hero-text{

    font-size:18px;
    line-height:1.9;
    color:var(--text-secondary);

/* =========================================================
LAYOUT
========================================================= */

    grid-template-columns:340px 1fr;
    gap:32px;

    padding-bottom:80px;
}

.sidebar{

    top:110px;

    height:calc(100vh - 140px);

    overflow:auto;

    padding-right:8px;
}

.sidebar::-webkit-scrollbar{
    width:4px;

.sidebar::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.08);

.phase-card{

    padding:18px;
    margin-bottom:14px;

    border-radius:var(--radius-md);

    border:1px solid var(--border-soft);

    background:var(--card-bg);

    transition:var(--transition);

    cursor:pointer;
}

.phase-card:hover{
    transform:translateY(-2px);
}

.phase-card.active{
    border-color:var(--accent);
    background:rgba(255,255,255,.06);
}

.phase-day{
    font-size:12px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:10px;
}

.phase-title{

    font-size:26px;
    line-height:1.1;
    margin-bottom:10px;
}

.phase-sub{
    color:var(--text-secondary);
    line-height:1.7;
    font-size:14px;

========================================================= */

let current = 0;

const sidebar = document.getElementById("sidebar");

function renderSidebar(){

    sidebar.innerHTML = "";

    phases.forEach((phase,index)=>{

        const div = document.createElement("div");

        div.className = "phase-card" + (index === current ? " active" : "");

        div.innerHTML = `
            <div class="phase-day">${phase.day}</div>
            <div class="phase-title">${phase.title}</div>
            <div class="phase-sub">${phase.subtitle}</div>
        `;

        div.onclick = ()=>{

            current = index;
            render();

        };

        sidebar.appendChild(div);

    });

}

function render(){

    renderSidebar();

    const phase = phases[current];

    document.getElementById("phaseTag").innerText = phase.day;

    document.getElementById("detailTitle").innerText = phase.title;

    document.getElementById("detailSub").innerText = phase.subtitle;

    document.getElementById("realm").innerText = phase.realm;

    document.getElementById("participants").innerText = phase.participants;

    const activities = document.getElementById("activities");

    activities.innerHTML = "";

    phase.activities.forEach(activity=>{

        const div = document.createElement("div");

        div.className = "activity";

        div.innerHTML = `
            <h4>${activity.title}</h4>
            <ul>
                ${activity.items.map(item=>`<li>${item}</li>`).join("")}
            </ul>
        `;

        activities.appendChild(div);

    });

}

function nextPhase(){

    current = (current + 1) % phases.length;

    render();

}

function prevPhase(){

    current = (current - 1 + phases.length) % phases.length;

    render();

}

document.querySelectorAll(".theme-btn").forEach(btn=>{

    btn.addEventListener("click",()=>{

        document.body.className = btn.dataset.theme;

    });

});

render();

</script>

</body>
