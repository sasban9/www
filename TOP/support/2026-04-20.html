    <style>
        html{scrollbar-width: none;}
        body{background: #111;color: white;filter: multiply; font-size: 2.2rem;font-family:monospace;display: flex;justify-content: center;align-items: content;height: 98vh;animation: colorChange 12s infinite;}
        table{border-collapse: collapse;}
        td{border: solid 1px #fff;padding: 0 1rem;}
        td:nth-of-type(3){text-align: right;}

        @keyframes colorChange {
            0%{background: magenta;}
            20%{background: darkred;}
            40%{background: darkgreen;}
            60%{background: #5c380d;}
            80%{background: darkslateblue;}
            90%{background: #4e0638;}
        }
    </style>
</head>

    <!-- <script src="https://jsdelivr.net"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>
    <script>
        window.addEventListener('keydown', (event) => {
        // Check if the pressed key is 'c' or 'C'
        if (event.key.toLowerCase() === 'c') {
            confetti({
            particleCount: 100,
            startVelocity: 30,
            spread: 360,
            origin: {
                x: 0.75 || 0.25,
                // since they fall down, start a bit higher than random
                y: Math.random() - 0.2
            }
            });
        }
        });
    </script>
